name: '<aqua>Vote'
size: 27
type: VOTE
items:
  fill:
    item:
      material: GRAY_STAINED_GLASS_PANE
    slots:
      - 0-10
      - 12-14
      - 16-26
  vote-link:
    slot: 11
    item:
      material: HOPPER
      name: '<yellow>Vote'
      lore:
        - '<white><b>| <dark_gray>Click to vote on'
        - '  <aqua>(replace_your_vote_link_here)'
        - ''
        - '<dark_blue>[!] <dark_gray>You can vote every'
        - '<dark_gray>(How often they can vote)'
    close-inventory: true
    actions:
      - type: message
        messages:
          - '&fHey &b%player% &fclick here to vote'
          - '&7(replace_your_vote_link_here)'
        mini-message: true
  player-head:
    slot: 15
    item:
      material: PLAYER_HEAD
      name: '<green>%player_name%'
      lore:
        - '<white><b>| <gray>You have <white>%zvoteparty_player_votes%<gray> votes'
        - ''
        - '<white><b>| <light_purple>VoteParty <dark_gray>- <aqua>%zvoteparty_votes_recorded% <dark_gray>/ <green>%zvoteparty_votes_required_total%'
        - '<white><b>| %zvoteparty_votes_progressbar%'