#
#
#   Commands and permissions:
#   - /vote ﾂｻ Open vote invenroy - zvoteparty.vote
#   - /zvoteparty ﾂｻ Show needed votes for vote party (aliases: /vp, /voteparty) - zvoteparty.use
#   - /zvoteparty reload ﾂｻ Reload configuration - zvoteparty.reload
#   - /zvoteparty config ﾂｻ Open ingame configuration - zvoteparty.config
#   - /zvoteparty version ﾂｻ Show plugin version
#   - /zvoteparty help ﾂｻ Send commands description and syntax - zvoteparty.help
#   - /zvoteparty add ﾂｻ Add vote to player - zvoteparty.add
#   - /zvoteparty startparty ﾂｻ Force launch a Vote Party - zvoteparty.startparty
#   
#   Placeholders:
#   - %zvoteparty_votes_recorded% ﾂｻ Returns the current amount of votes in the Vote Party.   
#   - %zvoteparty_votes_required_party% ﾂｻ Returns the amount of votes left that are needed for a Vote Party to happen.
#   - %zvoteparty_votes_required_total% ﾂｻ Returns the total amount of votes needed for a Vote Party to happen.
#   - %zvoteparty_player_votes% ﾂｻ Returns the total amount of votes a player has.
#   - %zvoteparty_votes_progressbar% ﾂｻ Return a progress bar for the vote party
#   
#   
#########################################################################################################################################

# Rewards when a player goes to vote
rewards:
  1:
    percent: 10
    needToBeOnline: false # Player must not be online to receive the reward
    commands:
      - "eco give %player% 100"
    broadcast:
      - "&f%player% &7just won &a$100"
  2:
    percent: 30
    needToBeOnline: true # Player must be online to receive the reward
    commands:
      - "give %player% minecraft:stone 10"
    broadcast:
      - "&f%player% &7just won &ax10 stone"      
  3:
    percent: 30
    needToBeOnline: false # Player must not be online to receive the reward
    commands:
      - "eco give %player% 500"
    broadcast: []   
  4:
    percent: 30
    needToBeOnline: true # Player must be online to receive the reward
    commands:
      - "cr give %player% diamand"
    broadcast:
      - "&7&m----------"
      - "&f%player% &7just won &ax1 diamand"
      - "&7&m----------"      
      
party:
  # The amount of votes needed
  votes_needed: 50
  
  # The command that will be executed when the number of votes is reached for each online players
  global_commands:
    - "eco give %player% 100"
    
  # This command will be executed in the console, you cannot specify a player here
  commands:
    - "eco give * 0.0000000009"  
  # Sound to be played after Vote Party is triggered.
  # Sound: <SOUND>:<VOLUME>:<PITCH> - Name of the sound to play. A list of available sounds is found here: https://docs.andre601.ch/Spigot-Sounds/sounds/1.21.x/1.21.4/
  Sound: UI_TOAST_CHALLENGE_COMPLETE:1:2
    
  # Rewards that the player can get randomly 
  rewards:
    1:
      percent: 50
      commands:
        - "give %player% minecraft:diamond 1"
    2:
      percent: 50
      commands:
        - "cr give %player% test"  
        
#Database informations
sql:
  user: "homestead"
  password: "secret"
  port: 3306
  host: "192.168.10.10"
  database: "zvoteparty"         